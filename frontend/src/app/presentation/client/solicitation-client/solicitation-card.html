<div class="flex flex-col text-lg w-[63vh] h-[22vh] p-2 bg-[#CA99AB] border-solid border-5 border-[#7B1D26] rounded-[22px] break-words font-semibold shadow-lg">
    <div class="flex flex-row justify-around">
        <div [style.background-color]="'var(--' + estado() + ')'"
        class="flex w-[13vh] h-[30px] text-sm justify-center items-center rounded-[10px]">
            {{estado()}}
        </div>
        <div class="flex w-[13vh] h-[30px] text-sm justify-center items-center rounded-[10px] bg-(--queen-pink)">
            {{eqp()}}
        </div>
        @if(nome()){
            <div class="flex w-[25vh] h-[32px] text-md bg-(--queen-pink) justify-center items-center rounded-[10px]">
                {{nome()}}
            </div>
        }
        
    </div>

    <div class="flex w-[48] m-2 h-[13vh] text-sm bg-(--queen-pink) p-[4px] rounded-[10px] break-words overflow-y-auto">
        {{desc()}}
    </div>

    <div class="flex flex-row justify-around">
        <div class="flex w-[18vh] h-[30px] text-sm bg-(--queen-pink) justify-center items-center rounded-[10px]">
            {{data()}}
        </div>
        <div (click)="openSol()" class="flex w-[18vh] h-[30px] text-md bg-(--queen-pink) justify-center items-center rounded-[10px] hover:cursor-pointer hover:bg-pink-600">
            Visualizar
        </div>
    </div>
</div>
