<div class="flex flex-col w-[82vh] h-[65vh] bg-[image:var(--wallpaper-kitty)] bg-cover bg-center p-3 gap-2 border-solid border-5 border-[#7B1D26] rounded-[22px] overflow-y-auto">
  <div class="flex flex-col w-xl" [formGroup]="form">

    <mat-form-field class="">
      <mat-label>Descrição do Equipamento</mat-label>
      <input matInput formControlName="descEquip">
    </mat-form-field>
    <mat-form-field>
      <mat-label>Categoria do Equipamento</mat-label>
      <mat-select formControlName="catID">
        @for (categorias of cats(); track categorias.id) {
          <mat-option value="{{categorias.categoryName}}"> {{ categorias.categoryName }} </mat-option>
          <!--mudei o value para o nome, n é ideal mas é melhor do q 'one'-->
        }      
      </mat-select>
    </mat-form-field>
    <mat-form-field>
      <mat-label>Descrição do Defeito</mat-label>
      <textarea matInput formControlName="descDefeito" rows="6"></textarea>
    </mat-form-field>
    <p>
        <button (click)="onSubmit()"
        class="items-end bg-(--queen-pink) border-3 rounded-xl border-(--french-puce) hover:cursor-pointer p-2 font-bold text-(--french-puce) text-l">
        SOLICITAR</button>
    </p>
  </div>
</div>
