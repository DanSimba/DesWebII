<div class="flex flex-col w-[82vh] h-[65vh] bg-pink-700/50 p-3 gap-2 border-solid border-5 border-[#7B1D26] rounded-[22px] overflow-y-auto">

  <app-maintenance-filter (filterChanged)="applyFilter($event)"></app-maintenance-filter>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-2">
    <app-maintenance-card *ngFor="let req of filteredRequests" 
                          [req]="req"
                          (actionClick)="handleAction($event)">
    </app-maintenance-card>
  </div>

</div>
