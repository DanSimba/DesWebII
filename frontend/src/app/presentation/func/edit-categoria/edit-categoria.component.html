<div class="flex flex-col w-[80vh] bg-(--antique-ruby)/70 p-3 gap-2 border-solid border-5 border-[#7B1D26] rounded-[22px]">

  <div class="flex font-bold w-[32vh] h-[16vh] p-2 items-center justify-center text-[22px] bg-(--queen-pink) rounded-[10px]">
    {{ editando ? 'Editar' : 'Nova' }} Categoria
  </div>

  <form [formGroup]="form" class="flex flex-col gap-4 p-2">

    <div class="flex flex-col gap-1">
      <label class="text-white font-bold uppercase text-[12px] tracking-widest">
        Nome da Categoria
      </label>
      <input
        formControlName="nome"
        type="text"
        placeholder="Ex: Notebook"
        class="p-3 rounded-[10px] bg-(--queen-pink) font-bold text-sm outline-none border-2 border-transparent focus:border-[#7B1D26] transition-all"
      />
      @if (form.get('nome')?.invalid && form.get('nome')?.touched) {
        <span class="text-white text-[11px] font-bold">
          Nome obrigatório (mínimo 3 caracteres)
        </span>
      }
    </div>

    <div class="flex gap-4">
      <button
        type="button"
        (click)="onSubmit()"
        class="text-white text-[10px] font-bold py-2 px-4 shadow-sm transition-colors uppercase flex items-center gap-2 hover:bg-green-700 rounded">
        Salvar
      </button>
      <button
        type="button"
        (click)="cancelar()"
        class="text-white text-[10px] font-bold py-2 px-4 shadow-sm transition-colors uppercase flex items-center gap-2 hover:bg-red-700 rounded">
        Cancelar
      </button>
    </div>

  </form>

</div>
