  <div class="flex flex-col w-[82vh] h-[65vh] bg-pink-700/50 p-3 gap-2 border-solid border-5 border-[#7B1D26] rounded-[22px] overflow-y-auto">
    <div class="flex font-bold w-[32vh] h-[16vh] p-2 items-center justify-center text-[22px] bg-(--queen-pink) rounded-[10px]">
      CRUD - Categorias
    </div>

    <div class="flex gap-4">
        <div class="text-xl m-2 p-1 text-center font-bold bg-(--queen-pink) rounded-[10px] p-4 w-1/2">
            <button type="button" (click)="novaCat()">New categoria</button>
        </div>
        <div class="text-xl m-2 p-1 text-center font-bold bg-(--queen-pink) rounded-[10px] p-4 w-1/2">
            <button type="button" (click)="filtrarCat()">Filtros</button>
        </div>
    </div>
    
    <div class="shadow-2xl overflow-hidden border-x-4 border-b-4 overflow-y-auto">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-800 text-white uppercase text-[10px] tracking-widest">
                        <th class="p-4 text-center">ID</th>
                        <th class="p-4 text-center">Category title</th>
                        <th class="p-4 text-center">Action</th>
                    </tr>
                </thead>
                <tbody class="text-gray-700">
                        <tr *ngFor="let categoria of categorias" class="border-b border-gray-100 hover:bg-red-50 transition-all">
                            <td class="p-4 border-r text-xs font-mono text-center">{{categoria.id}}</td>
                            <td class="p-4 border-r font-bold text-sm uppercase text-center">{{categoria.nome}}</td>
                            <td class="p-4 text-center flex space-x-4">
                                <button (click)="editarCat()" class="text-white text-[10px] font-bold py-2 px-4 shadow-sm transition-colors uppercase flex items-center space-x-2 gap-2 hover:bg-green-700 rounded">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 w-4 h-4">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                                    </svg>
                                    Edit
                                </button>
                                <button (click)="removerCat()" class="text-white text-[10px] font-bold py-2 px-4 shadow-sm transition-colors uppercase flex items-center space-x-2 gap-2 hover:bg-green-700 rounded">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 w-4 h-4">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                                    </svg>
                                    Delete
                                </button>
                            </td>
                        </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
