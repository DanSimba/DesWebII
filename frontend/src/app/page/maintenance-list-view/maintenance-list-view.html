<div

  <div
    class="flex font-bold w-[45vh] h-[12vh] p-2 items-center justify-center text-[20px] bg-(--queen-pink) rounded-[10px] border-solid border-5 border-(--antique-ruby) text-(--french-puce) uppercase tracking-tighter shadow-md">

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
