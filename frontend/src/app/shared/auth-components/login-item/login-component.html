<div class="flex gap-4">
  <!--Imagem lateral ao formulario-->
  <div class="border-3 border-(--parrot-pink) p-4 w-[400px] h-[400px] justify-center">
    <mat-icon class="content-center justify-center"
    aria-hidden="false" aria-label="setting icon" fontIcon="person" style="color: var(--french-puce); width: 100%; height: 100%; font-size: 350px;"></mat-icon>
  </div>
  <!--Estrutura do formulario-->
  <div class="flex flex-col items-center gap-2  w-[400px] h-[400px]">
    <!--ICONE TITULO-->
    <div class="flex w-full h-1/6 gap-2">
      <!--Icone de manutencao-->
      <div class="justify-center content-center">
        <mat-icon aria-hidden="false" aria-label="setting icon" fontIcon="settings" style="color: var(--french-puce); width: 60px; height: 60px; font-size: 60px;"></mat-icon>
      </div>
      <!--Titulo-->
      <div class="border-3 border-(--parrot-pink) w-full">
        <h3 class="text-(--french-puce) font-bold border-(--parrot-pink) p-4 text-xl">
          MAINTEC - MANUTENCAO
        </h3>
      </div>
    </div>
    <!--Campos formulario-->
    <div class="flex gap-2 w-full h-4/6 ">    
      <div class="p-6 w-4/5 content-center">
        <h3 class="text-(--french-puce) font-bold text-xl">Login:</h3>
        <div class="p-4 flex flex-col gap-8">
          <div class="flex items-center justify-center">
            <div class="relative">
              <input
                id="email"
                name="email"
                type="text"
                placeholder=""
                class="border-b border-(--french-puce) py-1 focus:border-b-2 focus:border-(--french-puce) transition-colors focus:outline-none peer bg-inherit"
              />
              <label
                for="email"
                class="text-(--french-puce) absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-(--french-puce) peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
              >
                Email
              </label>
            </div>
          </div>
          <div class="flex items-center justify-center">
            <div class="relative">
              <input
                id="password"
                name="password"
                type="password"
                placeholder=""
                class="text-(--french-puce) border-b border-(--french-puce) py-1 focus:border-b-2 focus:border-(--french-puce) transition-colors focus:outline-none peer bg-inherit"
              />
              <label
                for="password"
                class="text-(--french-puce) absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-(--french-puce) peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
              >
                Senha
              </label>
            </div>
          </div>
        </div>
      </div>
      <div class="border-3 border-(--parrot-pink) w-1/5 "></div>
    </div>
    <!--Botões de login-->
    <div class="w-full flex gap-2 h-1/6">
      <div class="border-3 border-(--parrot-pink) w-4/5 content-center">
        <button class="hover:cursor-pointer p-2 font-bold text-(--french-puce) text-l">< CADASTRAR-SE</button>
      </div>
      <button class="hover:cursor-pointer p-2 font-bold w-1/5 text-(--french-puce) text-xl">LOGIN></button>
    </div>
  </div>
</div>
