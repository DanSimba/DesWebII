<form class="p-2 w-full content-center h-full">
  <div class="p-4 flex flex-col h-full justify-around">
    <!--CPF - id=name-->
    <div class="flex items-center justify-center">
      <div class="relative">
        <input
          id="cpf"
          name="cpf"
          type="text"
          placeholder=""
          class="border-b border-(--french-puce) py-1 focus:border-b-2 focus:border-(--french-puce) transition-colors focus:outline-none peer bg-inherit"
        />
        <label
          for="cpf"
          class="text-(--french-puce) absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-(--french-puce) peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
        >
          CPF
        </label>
      </div>
    </div>
    <!--Nome - id=name-->
    <div class="flex items-center justify-center">
      <div class="relative">
        <input
          id="name"
          name="name"
          type="text"
          placeholder=""
          class="text-(--french-puce) border-b border-(--french-puce) py-1 focus:border-b-2 focus:border-(--french-puce) transition-colors focus:outline-none peer bg-inherit"
        />
        <label
          for="name"
          class="text-(--french-puce) absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-(--french-puce) peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
        >
          Nome
        </label>
      </div>
    </div>
    <!--Email - id=email-->
    <div class="flex items-center justify-center">
      <div class="relative">
        <input
          id="email"
          name="email"
          type="email"
          placeholder=""
          class="border-b border-(--french-puce) py-1 focus:border-b-2 focus:border-(--french-puce) transition-colors focus:outline-none peer bg-inherit"
        />
        <label
          for="email"
          class="text-(--french-puce) absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-(--french-puce) peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
        >
          Email
        </label>
      </div>
    </div>
    <!--Telefone - id=phone-->
    <div class="flex items-center justify-center">
      <div class="relative">
        <input
          id="phone"
          name="phone"
          type="phone"
          placeholder=""
          class="border-b border-(--french-puce) py-1 focus:border-b-2 focus:border-(--french-puce) transition-colors focus:outline-none peer bg-inherit"
        />
        <label
          for="phone"
          class="text-(--french-puce) absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-(--french-puce) peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
        >
          Telefone
        </label>
      </div>
    </div>
  </div>
</form>
