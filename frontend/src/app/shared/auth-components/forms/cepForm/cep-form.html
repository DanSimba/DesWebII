<form action="" class="flex flex-col justify-around m-2 h-full">
  <!--Campos-->
  <!--CEP - id=cep-->
  <div class="relative w-full">
    <input
      id="cep"
      name="cep"
      type="tel"
      placeholder=""
      required
      class="border-b border-(--french-puce) py-1 focus:border-b-2 focus:border-(--french-puce) transition-colors focus:outline-none peer bg-inherit w-full"
      #cep
      (input)="cepAlteration(cep.value)"
      mask="00000-000"
    />
    <label
      for="cep"
      class="text-(--french-puce) absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-(--french-puce) peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
    >
      CEP
    </label>
  </div>
  <!--Logradouro - id=logradouro-->
  <div class="relative w-full">
    <input
      id="logradouro"
      name="logradouro"
      type="text"
      placeholder=""
      [value]="cepInfo.logradouro"
      class="border-b border-(--french-puce) py-1 focus:border-b-2 focus:border-(--french-puce) transition-colors focus:outline-none peer bg-inherit w-full"
      
    />
    <label
      for="logradouro"
      class="text-(--french-puce) absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-(--french-puce) peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
    >
      Logradouro
    </label>
  </div>
  <!--Numero/UF - id=numero e id=uf-->
  <div class="w-full flex gap-4">
    <!--Numero-->
    <div class="relative w-1/2">
      <input
        id="numero"
        name="numero"
        type="number"
        placeholder=" "
        min="0"
        class="border-b border-(--french-puce) py-1 focus:border-b-2 focus:border-(--french-puce) transition-colors focus:outline-none peer bg-inherit w-full"
      />
      <label
        for="numero"
        class="text-(--french-puce) absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-(--french-puce) peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
      >
        Numero
      </label>
    </div>
    <!--UF-->
    <div class="relative w-1/6">
      <input
        id="uf"
        name="UF"
        type="text"
        placeholder=""
        [value]="cepInfo.uf" 
        class="border-b border-(--french-puce) py-1 focus:border-b-2 focus:border-(--french-puce) transition-colors focus:outline-none peer bg-inherit w-full"
        
      />
      <label
        for="UF"
        class="text-(--french-puce) absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-(--french-puce) peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
      >
        UF
      </label>
    </div>
  </div>
  <!--Bairro - id=bairro-->
  <div class="relative w-full">
    <input
      id="bairro"
      name="bairro"
      type="text"
      placeholder=""
      [value]="cepInfo.bairro" 
      class="border-b border-(--french-puce) py-1 focus:border-b-2 focus:border-(--french-puce) transition-colors focus:outline-none peer bg-inherit w-full"
 
    />
    <label
      for="bairro"
      class="text-(--french-puce) absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-(--french-puce) peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
    >
      Bairro
    </label>
  </div>
  <!--Complemento - id=complemento-->
  <div class="relative w-full">
    <input
      id="complemento"
      name="complemento"
      type="text"
      placeholder=""
      [value]="cepInfo.complemento" 
      class="border-b border-(--french-puce) py-1 focus:border-b-2 focus:border-(--french-puce) transition-colors focus:outline-none peer bg-inherit w-full"
   
    />
    <label
      for="complemento"
      class="text-(--french-puce) absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-(--french-puce) peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
    >
      Complemento
    </label>
  </div>
 
</form>
