<!--AUTOCADASTRO PAGE-->
<div class="bg-[#f52c39] flex w-screen justify-center p-6 gap-2">
  <!--Imagem que vai existir lateral ao perfil-->
  <div class="border-3 border-white p-4">
    <h3 class="text-white text-bold">icon discutivel</h3>
  </div>
  <!--Formulario de autocadastro-->
  <div class="border-3 border-white p-4">
    <!--Titulo-->
    <div class="flex items-center">
      <h3 class="text-white p-4">COG</h3>
      <div class="border-3 border-white">
        <h3 class="text-white font-bold border-white p-4">MAINTEC - MANUTENCAO</h3>
      </div>
    </div>
    <!--Inputs-->
    <div class="p-4">
      <h3 class="text-white font-bold">Autocadastro:</h3>
      <div class="p-4 flex flex-col gap-6">
        <div class="flex items-center justify-center">
          <div class="relative">
            <input
              id="cpf"
              name="cpf"
              required
              type="text"
              placeholder=""
              maxlength="14"
              inputmode="numeric"
              pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
              class="text-white border-b border-white py-1 focus:border-b-2 focus:border-white transition-colors focus:outline-none peer bg-inherit"
            />
            <label
              for="cpf"
              class="text-white absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-white peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
            >
              CPF
            </label>
          </div>
        </div>
        <div class="flex items-center justify-center">
          <div class="relative">
            <input
              id="nome"
              name="nome"
              required
              type="text"
              placeholder=""
              class="text-white border-b border-white py-1 focus:border-b-2 focus:border-white transition-colors focus:outline-none peer bg-inherit"
            />
            <label
              for="nome"
              class="text-white absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-white peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
            >
              Nome
            </label>
          </div>
        </div>
        <div class="flex items-center justify-center">
          <div class="relative">
            <input
              id="email"
              name="email"
              required
              type="email"
              placeholder=""
              class="text-white border-b border-white py-1 focus:border-b-2 focus:border-white transition-colors focus:outline-none peer bg-inherit"
            />
            <label
              for="email"
              class="text-white absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-white peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
            >
              E-mail
            </label>
          </div>
        </div>
        <div class="flex items-center justify-center">
          <div class="relative">
            <input
              id="endereço"
              name="endereço"
              required
              type="text"
              placeholder=""
              class="text-white border-b border-white py-1 focus:border-b-2 focus:border-white transition-colors focus:outline-none peer bg-inherit"
            />
            <label
              for="endereço"
              class="text-white absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-white peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
            >
              Endereço
            </label>
          </div>
        </div>
        <div class="flex items-center justify-center">
          <div class="relative">
            <input
              id="telefone"
              name="telefone"
              required
              type="tel"
              placeholder=""
              class="text-white border-b border-white py-1 focus:border-b-2 focus:border-white transition-colors focus:outline-none peer bg-inherit"
            />
            <label
              for="telefone"
              class="text-white absolute -top-4 text-xs left-0 cursor-text peer-focus:text-xs peer-focus:-top-4 transition-all peer-focus:text-white peer-placeholder-shown:top-1 peer-placeholder-shown:text-sm"
            >
              Telefone
            </label>
          </div>
        </div>
      </div>
    </div>
    <!--envios-->
    <div></div>
  </div>
</div>
